<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CARTA — 영상 레퍼런스 아카이브</title>
<meta name="description" content="모션그래픽·영화·애니메이션 레퍼런스를 GIF로 큐레이션합니다" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap header-inner">
    <span class="brand">CARTA</span>
    <button id="admin-toggle" class="admin-toggle" type="button" title="관리자" aria-label="관리자">
      <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path fill="black" d="
          M11.1 2.1

          C12.1 2.1 13.1 3.5 13.8 5.2
          C14.2 6.1 14.4 7 14.5 7.6

          C16.2 7.7 17.8 8.5 18.8 9.8
          C19.9 11.2 19.5 12.8 18.2 13.7
          C17.6 14.2 16.8 14.5 16 14.6

          C16.1 16.7 15.3 18.8 13.8 19.9
          C14.6 20 15.5 20.2 15.9 20.5
          C16.4 20.9 16.2 21.5 15.4 21.7
          L6.2 21.7
          C5.4 21.7 4.8 21.4 4.5 20.9

          C3.9 18.6 4.1 16.1 5.4 14.2
          C6.5 12.6 8.2 12.1 9.5 11.5
          C10.4 11.1 10.8 10.3 10.7 9.3
          C10.6 8.6 10.8 8 11.3 7.6

          C10 7.1 8.7 5.9 8 4.4
          C7.5 3.2 7.7 2.3 8.5 2.2
          C9.5 2.1 10.7 3.1 11.7 4.5

          C11.3 3.4 10.6 2.2 11.1 2.1
          Z
        "/>
        <ellipse cx="3.4" cy="19.5" rx="1.55" ry="1.25" fill="black"/>
      </svg>
    </button>
  </div>
</header>

<main class="wrap-wide">
  <section class="intro">
    <p class="intro-label">Curated Inspirations</p>
  </section>

  <section id="board" class="board">
    <p class="loading-msg">불러오는 중 —</p>
  </section>
</main>

<div id="video-modal" class="video-modal" hidden>
  <div class="video-modal-backdrop"></div>
  <div class="video-modal-content">
    <button id="video-modal-close" class="video-modal-close" type="button" aria-label="닫기">✕</button>
    <div class="video-modal-frame"></div>
  </div>
</div>

<template id="card-template">
  <a class="board-item" target="_blank" rel="noreferrer">
    <button class="board-delete" type="button" title="삭제">✕</button>
    <div class="board-media"></div>
    <div class="board-body">
      <h2 class="board-title"></h2>
      <p class="board-author"></p>
      <div class="board-meta-row">
        <span class="board-category"></span>
        <div class="board-keywords"></div>
      </div>
      <p class="board-desc"></p>
    </div>
  </a>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
